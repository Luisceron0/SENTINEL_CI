# File Purpose:
# - Execute Sentinel CI dogfooding pipeline on PRs and releases.
#
# Key Security Considerations:
# - Uses pinned GitHub action SHAs, least-privilege permissions, and fail-secure gates.
# - Blocks merges when scanner severity threshold or tests fail.
#
# OWASP 2025 Categories Addressed:
# - A03, A06, A08, A10

name: sentinel-ci

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sentinel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Sentinel CI action
        uses: ./
        with:
          api-endpoint: ${{ vars.SENTINEL_API_ENDPOINT }}
          api-key: ${{ secrets.SENTINEL_API_KEY }}
          scanners: semgrep,trivy,gitleaks,checkov,zap,opa
          dast-target: ${{ vars.PREVIEW_URL }}
          fail-on-severity: HIGH
          opa-policy-dir: .sentinel/policies

      - name: Validate action contracts
        run: |
          bash tests/action/test_scripts_exist.sh
          bash tests/action/test_aggregate_contract.sh

      - name: Upload scanner artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sentinel-results
          path: results/

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy api/

      - name: Pytest
        run: pytest tests/

  release-sbom:
    name: Release SBOM Asset
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Ensure SBOM exists
        run: |
          test -f results/trivy.sbom.json || {
            echo '{"bomFormat":"CycloneDX","components":[]}' > results/trivy.sbom.json
          }

      - name: Upload SBOM to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" results/trivy.sbom.json --clobber
